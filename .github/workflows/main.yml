name: System Info Collection

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  collect_system_info:
    runs-on: ubuntu-latest  # Use Ubuntu as the base image for the action

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python environment
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil cpuinfo

      - name: Create system info collection script
        run: |
          echo 'import platform' > generate_system_info.py
          echo 'import psutil' >> generate_system_info.py
          echo 'import os' >> generate_system_info.py
          echo 'import socket' >> generate_system_info.py
          echo 'import datetime' >> generate_system_info.py
          echo 'import subprocess' >> generate_system_info.py
          echo 'import time' >> generate_system_info.py
          echo 'import cpuinfo' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo '# Start collecting system information' >> generate_system_info.py
          echo 'system_info = ""' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo 'system_info += "\n=== System Information ===\n"' >> generate_system_info.py
          echo 'system_info += f"OS: {platform.system()} {platform.release()} {platform.version()}\n"' >> generate_system_info.py
          echo 'system_info += f"Machine: {platform.machine()}\n"' >> generate_system_info.py
          echo 'system_info += f"Processor: {platform.processor()}\n"' >> generate_system_info.py
          echo 'system_info += f"CPU Count: {psutil.cpu_count(logical=False)} physical cores\n"' >> generate_system_info.py
          echo 'system_info += f"CPU Cores: {psutil.cpu_count(logical=True)} logical processors\n"' >> generate_system_info.py
          echo 'system_info += f"CPU Frequency: {psutil.cpu_freq().current} MHz\n"' >> generate_system_info.py
          echo 'system_info += f"Total Memory: {round(psutil.virtual_memory().total / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo 'system_info += f"Used Memory: {round(psutil.virtual_memory().used / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo 'system_info += f"Available Memory: {round(psutil.virtual_memory().available / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo 'system_info += f"Swap Memory: {round(psutil.swap_memory().total / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo '# CPU usage per core' >> generate_system_info.py
          echo 'system_info += "\n=== CPU Usage per Core ===\n"' >> generate_system_info.py
          echo 'for i, percent in enumerate(psutil.cpu_percent(percpu=True, interval=1)):' >> generate_system_info.py
          echo '    system_info += f"Core {i}: {percent}% usage\n"' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo '# Disk Information' >> generate_system_info.py
          echo 'system_info += "\n=== Disk Information ===\n"' >> generate_system_info.py
          echo 'partitions = psutil.disk_partitions()' >> generate_system_info.py
          echo 'for partition in partitions:' >> generate_system_info.py
          echo '    usage = psutil.disk_usage(partition.mountpoint)' >> generate_system_info.py
          echo '    system_info += f"Partition: {partition.device}\n"' >> generate_system_info.py
          echo '    system_info += f"  Mountpoint: {partition.mountpoint}\n"' >> generate_system_info.py
          echo '    system_info += f"  Filesystem Type: {partition.fstype}\n"' >> generate_system_info.py
          echo '    system_info += f"  Total: {round(usage.total / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo '    system_info += f"  Used: {round(usage.used / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo '    system_info += f"  Free: {round(usage.free / (1024.0 ** 3), 2)} GB\n"' >> generate_system_info.py
          echo '    system_info += f"  Percentage: {usage.percent}% used\n"' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo '# Network Information' >> generate_system_info.py
          echo 'system_info += "\n=== Network Information ===\n"' >> generate_system_info.py
          echo 'interfaces = psutil.net_if_addrs()' >> generate_system_info.py
          echo 'for interface, addrs in interfaces.items():' >> generate_system_info.py
          echo '    for addr in addrs:' >> generate_system_info.py
          echo '        if addr.family == socket.AF_INET:' >> generate_system_info.py
          echo '            system_info += f"Interface {interface}: {addr.address}\n"' >> generate_system_info.py
          echo '' >> generate_system_info.py
          echo '# Write the collected information to a file' >> generate_system_info.py
          echo 'with open("system_info.txt", "w") as f:' >> generate_system_info.py
          echo '    f.write(system_info)' >> generate_system_info.py
          echo 'print("System information collected and saved to system_info.txt.")' >> generate_system_info.py

      - name: Run the system information collection script
        run: |
          python3 generate_system_info.py

      - name: Commit and push the system info file to the repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add system_info.txt
          git commit -m "Add system info report"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
