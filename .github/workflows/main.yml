name: System Info Collection

on:
  push:
    branches:
      - main  # This will run the workflow on push to the 'main' branch

jobs:
  collect-system-info:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository to the workflow runner
    - name: Checkout code
      uses: actions/checkout@v2

    # Step 2: Install required dependencies (Python, sysstat, stress, etc.)
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip sysstat stress nmap
        pip install psutil

    # Step 3: Create and run the system info Python script
    - name: Generate system info
      run: |
        echo "
import subprocess
import psutil
import platform
import os

def run_command(command):
    try:
        result = subprocess.check_output(command, stderr=subprocess.STDOUT).decode()
        return result
    except subprocess.CalledProcessError as e:
        return f'Error executing command: {e.output.decode()}'

system_info = f'''
System Information:
-------------------
Operating System: {platform.system()} {platform.release()} {platform.version()}
Platform: {platform.platform()}
Architecture: {platform.architecture()[0]}
Processor: {platform.processor()}
Machine: {platform.machine()}

Memory Information:
-------------------
Total Memory: {psutil.virtual_memory().total / (1024 ** 3):.2f} GB
Available Memory: {psutil.virtual_memory().available / (1024 ** 3):.2f} GB
Memory Usage: {psutil.virtual_memory().percent}%

Disk Information:
-------------------
Total Disk Space: {psutil.disk_usage('/').total / (1024 ** 3):.2f} GB
Used Disk Space: {psutil.disk_usage('/').used / (1024 ** 3):.2f} GB
Free Disk Space: {psutil.disk_usage('/').free / (1024 ** 3):.2f} GB
Disk Usage: {psutil.disk_usage('/').percent}%

CPU Information:
-------------------
CPU Count: {psutil.cpu_count(logical=False)}
Logical CPU Count: {psutil.cpu_count(logical=True)}
CPU Usage: {psutil.cpu_percent(interval=1)}%

Network Information:
--------------------
IP Address: {psutil.net_if_addrs()['eth0'][0].address if 'eth0' in psutil.net_if_addrs() else 'N/A'}
Network Interfaces: {', '.join(psutil.net_if_addrs().keys())}

Process Information:
--------------------
Total Processes: {len(psutil.pids())}
Top 5 Processes:
"""
top_processes = sorted(psutil.process_iter(['pid', 'name', 'memory_info']), key=lambda p: p.info['memory_info'].rss, reverse=True)[:5]
for proc in top_processes:
    system_info += f"PID: {proc.info['pid']}, Name: {proc.info['name']}, Memory: {proc.info['memory_info'].rss / (1024 ** 2):.2f} MB\n"

disk_speed = run_command(
    ['dd', 'if=/dev/zero', 'of=/tmp/test1.img', 'bs=1M', 'count=1024', 'oflag=dsync', 'status=none']
)
system_info += f"\nDisk Speed (Write Test): {disk_speed}"

run_command(['rm', '/tmp/test1.img'])

gpu_info = run_command(['nvidia-smi']) if os.system('which nvidia-smi') == 0 else 'No NVIDIA GPU found.'

system_info += f"\nGPU Information:\n{gpu_info}"

uptime = run_command(['uptime', '-p'])
system_info += f"\nUptime: {uptime}"

load_averages = os.getloadavg()
system_info += f"\nLoad Averages (1, 5, 15 min): {load_averages[0]:.2f}, {load_averages[1]:.2f}, {load_averages[2]:.2f}"

system_info += f"\nGitHub VM Details:\n{run_command(['uname', '-a'])}"

with open('system_info.txt', 'w') as f:
    f.write(system_info)

print('System information gathered successfully.')
        " > generate_system_info.py
        python3 generate_system_info.py

    # Step 4: Upload the generated system_info.txt file as an artifact
    - name: Upload system info artifact
      uses: actions/upload-artifact@v3
      with:
        name: system-info
        path: system_info.txt
